      background: #0f0c09;

    <!--
      Outer preview shell — only for standalone preview purposes.
      max-width here defines the "parent" width that everything below
      is measured against; in the real app this parent is whatever
      list/page container the card actually renders inside.
    -->
    <div style="/* max-width: 360px; */ width: 100%; /* margin: auto; */">
      <!--
        container-type: inline-size — this is the actual fix.
        Every cqw unit used anywhere inside this element resolves
        against ITS width. Without this line, cqw silently fails
        to resolve consistently.
      -->
      <div
        style="
          container-type: inline-size;
          container-name: menu-item;
          /* background: #161109; */
          /* border-radius: 3.8cqw; */

                justify-content: center;
